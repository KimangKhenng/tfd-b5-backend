# .github/workflows/deploy.yml
name: Deploy on develop branch

on:
    push:
        branches:
            - develop # Only deploy from develop branch

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Deploy to VPS via SSH
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: ${{ secrets.SSH_PORT }}
                  script: |
                      pwd
                      cd tfd-b5-backend
                      git reset --hard HEAD
                      git fetch origin develop
                      git checkout develop
                      git reset --hard origin/develop
                      git clean -fd
                      docker compose -f docker-compose.yml --env-file .env.dev -p tfd-b5-backend-dev build --no-cache
                      docker compose -f docker-compose.yml --env-file .env.dev -p tfd-b5-backend-dev up -d --remove-orphans
                      docker image prune -f
