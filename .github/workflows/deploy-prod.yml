# .github/workflows/deploy.yml
name: Deploy on master branch

on:
    push:
        branches:
            - master # Only deploy from master branch

env:
    IMAGE_NAME: kimang/tfd-b5-backend

jobs:
    build-push-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract short SHA
              id: vars
              run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

            - name: Build and push Docker image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ env.IMAGE_NAME }}:latest
                      ${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.sha }}

            - name: Deploy to VPS via SSH
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: ${{ secrets.SSH_PORT }}
                  script: |
                      cd tfd-b5-backend
                      docker compose -f docker-compose.prod.yml --env-file .env.prod -p tfd-b5-backend-prod pull
                      docker compose -f docker-compose.prod.yml --env-file .env.prod -p tfd-b5-backend-prod up -d --remove-orphans
                      docker image prune -f
